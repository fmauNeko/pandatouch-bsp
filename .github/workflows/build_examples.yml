name: Build examples

# Compiles all BSP examples on every change to BSP sources, examples, or CI scripts.
# LVGL examples build in parallel via matrix; the no-LVGL variant runs in a separate
# parallel job because it must generate pandatouch_noglib/ first.

on:
  push:
    branches: [develop, main]
    paths:
      - 'pandatouch/**'
      - 'examples/**'
      - '.github/**'
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - 'pandatouch/**'
      - 'examples/**'
      - '.github/**'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── LVGL examples (parallel matrix) ──────────────────────────────────────
  build:
    name: Build ${{ matrix.example }} (IDF ${{ matrix.idf_ver }})
    runs-on: ubuntu-latest
    container: espressif/idf:${{ matrix.idf_ver }}

    strategy:
      fail-fast: false
      matrix:
        idf_ver:
          - "release-v6.0"
        example:
          - display_hello
          - display_demo
          - display_lvgl_benchmark

    steps:
      - uses: actions/checkout@v4

      - name: Install upstream ccache
        run: |
          curl -fsSL https://github.com/ccache/ccache/releases/download/v4.12.3/ccache-4.12.3-linux-x86_64.tar.xz \
            | tar -xJ --strip-components=1 -C /usr/local/bin ccache-4.12.3-linux-x86_64/ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-${{ matrix.idf_ver }}-${{ matrix.example }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ matrix.idf_ver }}-${{ matrix.example }}-
            ${{ runner.os }}-ccache-${{ matrix.idf_ver }}-

      - name: Cache managed components
        uses: actions/cache@v4
        with:
          path: |
            examples/${{ matrix.example }}/managed_components
            examples/${{ matrix.example }}/dependencies.lock
          key: ${{ runner.os }}-components-${{ matrix.idf_ver }}-${{ matrix.example }}-${{ hashFiles('**/idf_component.yml') }}

      - name: Build ${{ matrix.example }}
        shell: bash
        run: |
          . ${IDF_PATH}/export.sh
          cd examples/${{ matrix.example }}
          idf.py build

      - name: Print ccache statistics
        if: always()
        run: ccache -sv

  # ── No-LVGL example (needs pandatouch_noglib generation) ─────────────────
  build-noglib:
    name: Build ${{ matrix.example }} (IDF ${{ matrix.idf_ver }})
    runs-on: ubuntu-latest
    container: espressif/idf:${{ matrix.idf_ver }}

    strategy:
      fail-fast: false
      matrix:
        idf_ver:
          - "release-v6.0"
        example:
          - display_noglib
          - display_slint

    steps:
      - uses: actions/checkout@v4

      - name: Install upstream ccache
        run: |
          curl -fsSL https://github.com/ccache/ccache/releases/download/v4.12.3/ccache-4.12.3-linux-x86_64.tar.xz \
            | tar -xJ --strip-components=1 -C /usr/local/bin ccache-4.12.3-linux-x86_64/ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-${{ matrix.idf_ver }}-${{ matrix.example }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ matrix.idf_ver }}-${{ matrix.example }}-
            ${{ runner.os }}-ccache-${{ matrix.idf_ver }}-

      - name: Cache managed components
        uses: actions/cache@v4
        with:
          path: |
            examples/${{ matrix.example }}/managed_components
            examples/${{ matrix.example }}/dependencies.lock
          key: ${{ runner.os }}-components-${{ matrix.idf_ver }}-${{ matrix.example }}-${{ hashFiles('**/idf_component.yml') }}

      - name: Install Python CI dependencies
        shell: bash
        run: |
          . ${IDF_PATH}/export.sh
          pip install py-markdown-table --upgrade

      - name: Generate pandatouch_noglib
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          . ${IDF_PATH}/export.sh
          python .github/ci/bsp_noglib.py pandatouch

      - name: Build ${{ matrix.example }}
        shell: bash
        run: |
          . ${IDF_PATH}/export.sh
          cd examples/${{ matrix.example }}
          idf.py build

      - name: Print ccache statistics
        if: always()
        run: ccache -sv
